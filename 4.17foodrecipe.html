<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오늘 뭐 먹지?</title>
  <link rel="stylesheet" href="4.17style.css">
</head>

<body>

<div class="container">
  <h1>🍳 오늘 뭐 먹지?</h1>

  <select id="categorySelect">
  <option value="">전체</option>
  <option value="반찬">반찬</option>
  <option value="국">국</option>
  <option value="찌개">찌개</option>
  <option value="후식">후식</option>
  <option value="일품">일품</option>
    </select>
  <div class="search-box">
    <input id="nameInput" placeholder="오늘 이걸 만들어 볼까?">
    <button id="nameBtn">음식 검색</button>
  </div>

  <div class="search-box">
    <input id="ingredientInput" placeholder="집에 뭐가 있더라..">
    <button id="ingredientBtn">재료 검색</button>
  </div>

  <div id="result"></div>
  
</div>

<script src="4.17app.js"></script>

</body>
</html>
